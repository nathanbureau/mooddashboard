:root {
  --bg:           #F7F4E7;
  --border:       #C4C3C1;
  --text:         #213741;
  --accent:       #3171F1;
  --error:        #FF603B;
  --mono:         'Space Grotesk', sans-serif;
  --display:      'National2Condensed', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.header {
  width: 100%;
  background: #213741;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-wordmark {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 700;
  color: #F7F4E7;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.header-divider { width: 1px; height: 18px; background: #4A4A4A; }

.header-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: #C4C3C1;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.header-spacer { flex: 1; }

.header-live {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: #C4C3C1;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.pulse { width: 8px; height: 8px; background: var(--error); border-radius: 50%; animation: pulse 2s ease infinite; }

@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

.frame {
  max-width: 1280px;
  margin: 0 auto;
  padding: 6vh 6vw;
  display: flex;
  flex-direction: column;
  gap: 6vh;
}

.headline { display: flex; flex-direction: column; gap: 8px; }

.eyebrow {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--border);
}

.big-num {
  font-family: var(--display);
  font-size: clamp(7rem, 22vw, 18rem);
  line-height: 0.85;
  color: var(--accent);
  letter-spacing: -0.01em;
}

.caption {
  font-family: var(--display);
  font-size: clamp(1.6rem, 3.5vw, 3rem);
  letter-spacing: 0.005em;
  margin-top: 6px;
}

.journey { display: flex; flex-direction: column; gap: 16px; }

.journey-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--border);
}

.bar {
  position: relative;
  height: 60px;
  background: rgba(196, 195, 193, 0.25);
  border-radius: 4px;
}

.marker {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 3px;
  background: currentColor;
  transition: left 0.8s cubic-bezier(0.65, 0, 0.35, 1);
}

.marker::after {
  content: attr(data-label);
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
  color: currentColor;
}

.marker::before {
  content: attr(data-value);
  position: absolute;
  bottom: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--display);
  font-size: 1.1rem;
  color: currentColor;
}

.marker.entry { color: var(--error); }
.marker.exit { color: var(--accent); }

.bar-scale {
  display: flex;
  justify-content: space-between;
  margin-top: 28px;
  font-size: 11px;
  color: var(--border);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--border);
}

.stat { padding: 28px 24px 24px 0; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; padding-right: 0; }

.stat-label {
  font-size: 11px;
  color: var(--border);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.stat-value {
  font-family: var(--display);
  font-size: clamp(2.5rem, 5vw, 4rem);
  line-height: 1;
}

.foot {
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--border);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

@media (max-width: 700px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .stat:nth-child(2) { border-right: none; }
  .stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-wordmark">BUREAU</div>
  <div class="header-divider"></div>
  <div class="header-sub">CHAOS TO CALM</div>
  <div class="header-spacer"></div>
  <div class="header-live"><span class="pulse"></span><span id="clock">live</span></div>
</div>

<div class="frame">

  <div class="headline">
    <div class="eyebrow">all time</div>
    <div class="big-num" id="calmedNum">0</div>
    <div class="caption" id="calmedCaption">people guided to calm</div>
  </div>

  <div class="journey">
    <div class="journey-meta">
      <span>average mood / arrival vs departure</span>
      <span id="deltaText">no data yet</span>
    </div>
    <div class="bar" id="bar">
      <div class="marker entry" id="entryMarker" data-label="arrival" data-value="0.0" style="left: 0%"></div>
      <div class="marker exit" id="exitMarker" data-label="departure" data-value="0.0" style="left: 0%"></div>
    </div>
    <div class="bar-scale">
      <span>chaos</span><span>neutral</span><span>zen</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">calmed today</div>
      <div class="stat-value" id="calmedToday">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">total calmness score</div>
      <div class="stat-value" id="calmnessScore">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">arrivals today</div>
      <div class="stat-value" id="entriesToday">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">departures today</div>
      <div class="stat-value" id="exitsToday">0</div>
    </div>
  </div>

  <div class="foot">
    <span>auto refresh / 30s</span>
    <span id="lastUpdate">never</span>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby7DC957ona0bUBoZiJBuLcQv7J40t4j_XqtIilL1FjrU9yK5N7GC_Iqq8zSBLH7GClgw/exec';
const REFRESH_MS = 30000;
const $ = id => document.getElementById(id);

async function load() {
  try {
    // same get pattern, action=stats tells the script to return aggregated json
    const res = await fetch(SCRIPT_URL + '?action=stats', { method: 'GET', mode: 'cors', cache: 'no-store' });
    const data = await res.json();
    render(data);
    $('lastUpdate').textContent = 'updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    $('lastUpdate').textContent = 'connection lost';
  }
}

function render(d) {
  // hero is now lifetime calmed
  $('calmedNum').textContent = d.allTimeCalmed ?? 0;
  $('calmedCaption').textContent = (d.allTimeCalmed === 1) ? 'person guided to calm' : 'people guided to calm';

  // stats row
  $('calmedToday').textContent = d.calmed ?? 0;
  $('entriesToday').textContent = d.todayEntries ?? 0;
  $('exitsToday').textContent = d.todayExits ?? 0;

  // total calmness score, prefix a plus when positive so the gain is visible
  const score = Number(d.calmnessScore) || 0;
  $('calmnessScore').textContent = (score > 0 ? '+' : '') + score;

  const entry = Number(d.avgEntry) || 0;
  const exit = Number(d.avgExit) || 0;
  const pct = v => Math.max(2, Math.min(98, ((v - 1) / 4) * 100));

  if (entry > 0) { $('entryMarker').style.left = pct(entry) + '%'; $('entryMarker').dataset.value = entry.toFixed(1); }
  if (exit > 0) { $('exitMarker').style.left = pct(exit) + '%'; $('exitMarker').dataset.value = exit.toFixed(1); }

  if (entry > 0 && exit > 0) {
    const delta = (exit - entry).toFixed(1);
    $('deltaText').textContent = (delta > 0 ? '+' : '') + delta + ' shift';
  }
}

load();
setInterval(load, REFRESH_MS);
</script>

</body>
</html>
